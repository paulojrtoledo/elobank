services:
  postgres:
    image: postgres:16
    container_name: spendly-postgres
    environment:
      POSTGRES_DB: spendly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: spendly-backend
    depends_on:
      - postgres
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_SPENDLY_URL: jdbc:postgresql://postgres:5432/spendly
      DB_SPENDLY_USERNAME: postgres
      DB_SPENDLY_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data: