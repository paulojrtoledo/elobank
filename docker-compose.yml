services:
  postgres:
    image: postgres:16
    container_name: elobank-postgres
    environment:
      POSTGRES_DB: elobank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: elobank-backend
    depends_on:
      - postgres
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_EB_URL: jdbc:postgresql://postgres:5432/elobank
      DB_EB_USERNAME: postgres
      DB_EB_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data: